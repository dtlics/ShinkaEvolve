name: CI

# Azure-only orchestrator fork: the CI gate is the OFFLINE orchestrator suite
# (pyproject testpaths = orchestrator/tests — parity / improvements / smoke; no
# Azure credentials needed). The upstream workflow linted a tests/ directory that
# was removed in the prune and uv-synced a lockfile-less project, so it failed on
# every push regardless of the change.

on:
  push:
  pull_request:

jobs:
  tests:
    name: Pytest (offline orchestrator suite)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: |
          pip install -e .
          pip install pytest pytest-cov

      - name: Pytest
        run: pytest -q -m "not requires_secrets"
