# Default Azure-backed Shinka portfolio.
# Use as a base for per-task overrides:  shinka_run --config-fname /path/to/this --set ...
#
# Models below correspond to deployments in the "Shinka" Foundry project (East US 2 Global Standard).
# Pricing, reasoning behavior, and temperature constraints are read from
# shinkaevolve/shinka/llm/providers/pricing.csv automatically.

evo:
  # Proposal pool — bandit chooses among these per generation.
  llm_models:
    - azure-gpt-5.4-pro     # strong reasoning anchor ($30/$180 per 1M tokens)
    - azure-gpt-5.5         # newer, mid-cost reasoning ($5/$30)
    - azure-gpt-5.3-codex   # coding-specialized; let UCB decide if it pays off ($1.75/$14)
    - azure-gpt-5.4-mini    # cheap fallback for easy generations ($0.75/$4.50)

  llm_kwargs:
    temperatures: [0, 0.5, 1.0]      # ignored for these reasoning models (forced to 1.0)
    reasoning_efforts: [medium, high] # gpt-5.4-pro REQUIRES >= medium (low rejected)
    max_tokens: 32768

  # Cheap model only — meta and novelty roles don't need premium reasoning.
  meta_llm_models:
    - azure-gpt-5.4-mini
  meta_llm_kwargs:
    temperatures: [0]
    reasoning_efforts: [low]
    max_tokens: 16384

  novelty_llm_models:
    - azure-gpt-5.4-mini
  novelty_llm_kwargs:
    temperatures: [0]
    reasoning_efforts: [low]

  # Azure embedding deployment. The bare 'text-embedding-3-small' name routes
  # to the OpenAI provider and demands OPENAI_API_KEY — keep the azure- prefix.
  embedding_model: azure-text-embedding-3-small

  # UCB1 cost-aware bandit — learns which model wins on this task.
  llm_dynamic_selection: ucb1
  llm_dynamic_selection_kwargs:
    cost_aware_coef: 0.5    # 0=reward-only, 1=cost-only. Raise toward 0.7 if budget-sensitive.
    exploration_coef: 1.0
    epsilon: 0.2

  # Hard cap. Override per task — start small while calibrating.
  max_api_costs: 25.0
